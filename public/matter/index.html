<!doctype html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#03a9f4" />
  <title>Open Home Foundation Matter Server</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script type="module" src="js/main.js"></script>
  <style>
  html {
    background-color: #f5f5f5;
  }

  html.dark-theme {
    background-color: #121212;
  }

  body {
    --roboto-font: 'Inter', Roboto, system-ui;
    --text-color: rgba(0, 0, 0, 0.6);
    --danger-color: #db4437;
    --success-color: #2e7d32;

    --md-sys-color-primary: #03a9f4;
    --md-sys-color-on-primary: #fff;
    --md-dialog-container-shape: 8px;
    --md-ref-typeface-brand: var(--roboto-font);
    --md-ref-typeface-plain: var(--roboto-font);

    --md-sys-color-background: #f5f5f5;
    --md-sys-color-on-background: #1c1b1f;
    --md-sys-color-surface: #fff;
    --md-sys-color-on-surface: #1c1b1f;
    --md-sys-color-on-surface-variant: #49454f;
    --md-sys-color-surface-variant: #e7e0ec;
    --md-sys-color-surface-container: #fff;
    --md-sys-color-surface-container-low: #f7f2fa;
    --md-sys-color-surface-container-high: #fff;
    --md-sys-color-surface-container-highest: #f5f5f5;
    --md-sys-color-secondary-container: #e0e0e0;
    --md-sys-color-error: #b3261e;
    --md-sys-color-on-error: #fff;
    --md-sys-color-error-container: #f9dedc;
    --md-sys-color-on-error-container: #410e0b;
    --md-sys-color-tertiary: #7d5260;
    --md-sys-color-on-tertiary: #fff;
    --md-sys-color-primary-container: #d0e4ff;
    --md-sys-color-on-primary-container: #001d36;
    --md-sys-color-outline: #79747e;
    --md-sys-color-outline-variant: #cac4d0;

    /* Developer-mode accent (deep violet — distinct from primary-cyan and error-red) */
    --dev-color: #5e35b1;
    --dev-on-color: #ffffff;

    /* Graph / network semantic colors */
    --signal-color-strong: #4caf50;
    --signal-color-medium: #ff9800;
    --signal-color-weak: #f44336;
    --signal-color-none: #9e9e9e;
    --node-color-selected: #1976d2;
    --node-color-offline: #d32f2f;
    --node-color-selected-offline: #b71c1c;
    --node-color-unknown: #ff9800;
    --node-color-default: #666666;
    --node-color-thread-leader: #f9a825;
    --node-color-thread-router: #1e88e5;
    --node-color-thread-enddevice: #90a4ae;
    --node-color-primary-bbr: #00897b;
    --graph-font-color: #333333;
    --graph-edge-dimmed: #cccccc;
    --graph-node-fallback: #999999;
    --monospace-font: "Roboto Mono", ui-monospace, monospace;

    --md-sys-typescale-headline-font: var(--roboto-font);
    --md-sys-typescale-title-font: var(--roboto-font);

    margin: 0;
    padding: 0;
    font-family: var(--roboto-font);
    background-color: var(--md-sys-color-background);
  }

  body {
    --primary-color: var(--md-sys-color-primary);
  }

  a {
    color: var(--primary-color);
  }

  /* Dark theme overrides */
  html.dark-theme body {
    --md-sys-color-primary: #3d82f0;
    --md-sys-color-on-primary: #e8edf5;
    --md-sys-color-background: #07090e;
    --md-sys-color-on-background: #dce8f8;
    --md-sys-color-surface: #0c1018;
    --md-sys-color-on-surface: #dce8f8;
    --md-sys-color-on-surface-variant: #5a7090;
    --md-sys-color-surface-variant: #121b27;
    --md-sys-color-surface-container: #0c1018;
    --md-sys-color-surface-container-low: #07090e;
    --md-sys-color-surface-container-high: #121b27;
    --md-sys-color-surface-container-highest: #182234;
    --md-sys-color-secondary-container: #1d2d40;
    --md-sys-color-on-secondary-container: #dce8f8;
    --md-sys-color-error: #e04545;
    --md-sys-color-on-error: #ffffff;
    --md-sys-color-error-container: rgba(224, 69, 69, 0.14);
    --md-sys-color-on-error-container: #e04545;
    --md-sys-color-tertiary: #7a5dcf;
    --md-sys-color-on-tertiary: #ffffff;
    --md-sys-color-primary-container: #253c54;
    --md-sys-color-on-primary-container: #3d82f0;
    --md-sys-color-outline: #253c54;
    --md-sys-color-outline-variant: #1d2d40;
    --dev-color: #7a5dcf;
    --dev-on-color: #ffffff;
    --signal-color-strong: #1fa355;
    --signal-color-medium: #d4961f;
    --signal-color-weak: #e04545;
    --signal-color-none: #5a7090;
    --node-color-selected: #3d82f0;
    --node-color-offline: #e04545;
    --node-color-selected-offline: #b85c52;
    --node-color-unknown: #d4961f;
    --node-color-default: #5a7090;
    --node-color-thread-leader: #d4961f;
    --node-color-thread-router: #3d82f0;
    --node-color-thread-enddevice: #5a7090;
    --node-color-primary-bbr: #1fa355;
    --graph-font-color: #dce8f8;
    --graph-edge-dimmed: #253c54;
    --graph-node-fallback: #5a7090;
    --text-color: rgba(220, 232, 248, 0.8);
    --danger-color: #e04545;
    --success-color: #1fa355;
    --primary-color: #3d82f0;
    color-scheme: dark;
  }

  /* Respect user preference for reduced motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
      scroll-behavior: auto !important;
    }
  }
  </style>
</head>
<body></body>
</html>
